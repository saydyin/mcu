<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Test your knowledge of the Forbidden Legacy - Sinnercell Edition (One Attempt Only)">
    <title>Sinnercell Trial | Forbidden Legacy MCU</title>
    <link rel="icon" type="image/x-icon" href="download.ico">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Metal+Mania&family=Special+Elite&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald-500: #10b981;
            --emerald-600: #059669;
            --emerald-700: #047857;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --option-bg: #f8fafc;
            --option-hover: #f1f5f9;
            --selected-bg: #d1fae5;
            --selected-border: var(--emerald-500);
            --correct-bg: #d1fae5;
            --incorrect-bg: #fee2e2;
            --incorrect-border: #ef4444;
            --shadow: 0 4px 16px rgba(0,0,0,0.04);
            --font-sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --font-serif: Georgia, 'Special Elite', 'Times New Roman', serif;
            --font-heading: 'Cinzel', 'Metal Mania', Georgia, 'Times New Roman', serif;
        }
        body.dark {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #334155;
            --option-bg: #1e293b;
            --option-hover: #334155;
            --selected-bg: #065f46;
            --selected-border: #10b981;
            --correct-bg: #065f46;
            --incorrect-bg: #7f1d1d;
            --incorrect-border: #dc2626;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --emerald-700: #6ee7b7;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .icon { width:1em; height:1em; display:inline-block; vertical-align:-0.125em; fill:currentColor; }

        /* Top bar */
        .top-bar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .brand {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--text);
            text-decoration: none;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        .brand .icon { color: var(--emerald-500); font-size: 1.3rem; }
        .right-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-left: auto;
        }
        .dark-toggle {
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            transition: 0.2s;
        }
        .dark-toggle:hover { background: var(--option-hover); color: var(--text); }
        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 24px;
            cursor: pointer;
            z-index: 101;
        }
        .hamburger span {
            display: block;
            height: 3px;
            width: 100%;
            background: var(--text);
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: var(--card-bg);
            border-left: 1px solid var(--border);
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
            z-index: 200;
            transition: right 0.3s ease;
            padding: 5rem 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .mobile-menu.open { right: 0; }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 150;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s, opacity 0.3s;
        }
        .menu-overlay.active { visibility: visible; opacity: 1; }
        .mobile-nav-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-family: var(--font-sans);
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: normal;
            color: var(--text);
            text-decoration: none;
            transition: background 0.2s;
        }
        .mobile-nav-btn:hover { background: var(--border); }
        .mobile-nav-btn.active { background: var(--emerald-500); color: #fff; }

        /* Quiz wrapper */
        .quiz-wrapper { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem 1.5rem; }
        .quiz-container { width:100%; max-width:720px; }
        .start-screen, .result-screen, .quiz-card, .review-screen {
            background:var(--card-bg); border:1px solid var(--border);
            border-radius:20px; padding:3rem 2rem; box-shadow:var(--shadow);
            animation: fadeInUp 0.5s ease-out; text-align:center;
        }
        .shield-icon { font-size:3.5rem; color:var(--emerald-500); margin-bottom:1.5rem; }
        .start-screen h2, .result-screen h2 {
            font-family: var(--font-heading);
            font-size:2rem; font-weight:700; margin-bottom:0.75rem;
            color: var(--text); letter-spacing:1px;
        }
        .start-screen p { color:var(--text-secondary); margin-bottom:1.5rem; max-width:450px; margin-inline:auto; font-family: var(--font-serif); }
        .btn {
            padding:0.8rem 2.2rem; background:var(--text); color:#fff;
            font-family: var(--font-heading);
            font-weight:600; text-transform:uppercase;
            letter-spacing:0.06em; border:none; border-radius:10px; cursor:pointer;
            transition:0.2s; display:inline-flex; align-items:center; gap:0.5rem;
        }
        .btn:hover { background: var(--emerald-700); }
        .btn:active { transform:scale(0.97); }
        .btn-outline {
            background:transparent; border:1px solid var(--border); color:var(--text);
            font-family:var(--font-sans); font-weight:600; text-transform:none;
        }
        .btn-outline:hover { background:var(--option-hover); }
        .quiz-card { padding:2rem 2rem 1.5rem; text-align:left; }
        .quiz-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem; flex-wrap:wrap; gap:0.5rem; }
        .decree-badge {
            font-family: var(--font-heading);
            font-size:0.7rem; font-weight:600; text-transform:uppercase;
            letter-spacing:0.08em; color:var(--emerald-700);
            background:var(--correct-bg); padding:0.3rem 0.8rem; border-radius:20px;
        }
        .quiz-meta { display:flex; align-items:center; gap:0.75rem; }
        .streak-display {
            display:flex; align-items:center; gap:0.25rem;
            font-size:0.85rem; font-weight:600; color:#f59e0b;
            transition:opacity 0.3s;
        }
        .streak-display.zero { color:var(--text-secondary); opacity:0.4; }
        .progress { font-family:monospace; font-size:0.85rem; color:var(--text-secondary); }
        .progress span { font-weight:700; color:var(--text); }
        .quiz-scenario { font-style:italic; color:var(--text-secondary); border-left:4px solid var(--border); padding-left:1rem; margin-bottom:1.8rem; font-family: var(--font-serif); }
        .quiz-question { font-family:var(--font-serif); font-size:1.25rem; font-weight:700; color:var(--text); margin-bottom:1.8rem; }
        .options-group { display:flex; flex-direction:column; gap:0.75rem; margin-bottom:1.5rem; }
        .quiz-option {
            display:flex; align-items:center; gap:1rem; padding:0.9rem 1.2rem;
            background:var(--option-bg); border:1px solid var(--border); border-radius:10px;
            cursor:pointer; transition:all 0.2s; text-align:left; font-size:0.95rem; outline:none;
            color: var(--text); font-family: var(--font-sans);
        }
        .quiz-option:hover, .quiz-option:focus-visible { background:var(--option-hover); border-color:var(--text-secondary); }
        .quiz-option[aria-checked="true"] {
            background:var(--selected-bg); border-color:var(--selected-border); font-weight:500;
        }
        .quiz-option.correct-feedback { background:var(--correct-bg); border-color:var(--emerald-500); }
        .quiz-option.incorrect-feedback { background:var(--incorrect-bg); border-color:var(--incorrect-border); }
        .option-circle {
            width:22px; height:22px; border:2px solid var(--text-secondary); border-radius:50%;
            display:flex; align-items:center; justify-content:center; flex-shrink:0;
            font-size:0.7rem; color:transparent; transition:0.2s;
        }
        .quiz-option[aria-checked="true"] .option-circle {
            border-color:var(--selected-border); color:var(--selected-border); background:#fff;
        }
        .quiz-option.correct-feedback .option-circle { border-color:var(--emerald-500); color:var(--emerald-500); }
        .quiz-option.incorrect-feedback .option-circle { border-color:var(--incorrect-border); color:var(--incorrect-border); }
        .quiz-actions { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; }
        .feedback-message { font-size:0.85rem; font-weight:500; min-height:1.5em; color:var(--emerald-600); flex:1; font-family: var(--font-sans); }
        .feedback-message.error { color:#dc2626; }
        .next-btn {
            padding:0.7rem 1.8rem; background:var(--text); color:#fff;
            font-family: var(--font-heading);
            font-weight:600; text-transform:uppercase;
            letter-spacing:0.05em; border:none; border-radius:8px; cursor:pointer;
            display:flex; align-items:center; gap:0.5rem; transition:0.2s;
        }
        .next-btn:disabled { opacity:0.5; cursor:not-allowed; background:var(--text-secondary); }
        .next-btn:not(:disabled):hover { background:var(--emerald-700); }
        .result-screen { text-align:center; }
        .result-icon { font-size:3.5rem; color:var(--emerald-500); margin-bottom:1.2rem; }
        .result-title {
            font-family: var(--font-heading);
            font-size:1.8rem; font-weight:700; margin-bottom:0.5rem;
            color: var(--text);
        }
        .result-subtitle { color:var(--text-secondary); margin-bottom:2rem; font-family: var(--font-serif); }
        .score-circle {
            display:inline-flex; flex-direction:column; align-items:center; justify-content:center;
            width:120px; height:120px; border-radius:50%; background:var(--option-bg);
            border:4px solid var(--emerald-500); margin:1rem auto 1.5rem;
        }
        .score-value { font-family: var(--font-heading); font-size:2.5rem; font-weight:700; color:var(--text); }
        .score-total { font-size:0.85rem; color:var(--text-secondary); margin-top:-5px; }
        .result-message { max-width:320px; margin:0 auto 1.5rem; color:var(--text-secondary); font-family: var(--font-serif); }
        .decree-breakdown {
            text-align:left; background:var(--option-bg); border:1px solid var(--border);
            border-radius:12px; padding:1.2rem 1.4rem; margin:0 auto 2rem; max-width:420px;
        }
        .decree-breakdown h4 {
            font-size:0.7rem; font-weight:600; text-transform:uppercase;
            letter-spacing:0.08em; color:var(--text-secondary); margin-bottom:0.8rem;
            font-family: var(--font-heading);
        }
        .breakdown-row {
            display:flex; align-items:center; gap:0.75rem; margin-bottom:0.5rem;
            font-size:0.85rem;
        }
        .breakdown-row:last-child { margin-bottom:0; }
        .breakdown-label { flex:1; color:var(--text-secondary); min-width:0; font-family: var(--font-serif); }
        .breakdown-bar-track {
            width:80px; height:6px; background:var(--border); border-radius:3px; overflow:hidden; flex-shrink:0;
        }
        .breakdown-bar-fill { height:100%; border-radius:3px; background:var(--emerald-500); transition:width 0.6s ease; }
        .breakdown-bar-fill.zero { background:var(--text-secondary); opacity:0.3; }
        .breakdown-score { font-weight:700; color:var(--text); width:2.5rem; text-align:right; flex-shrink:0; font-family:monospace; }
        .result-actions { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-top:1.5rem; }
        .review-screen { text-align:left; }
        .review-header {
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:1.5rem; flex-wrap:wrap; gap:0.75rem;
        }
        .review-header h2 { font-family: var(--font-heading); font-size:1.4rem; font-weight:700; color: var(--text); }
        .review-item {
            border:1px solid var(--border); border-radius:12px; padding:1.2rem 1.4rem;
            margin-bottom:1rem; background:var(--option-bg);
        }
        .review-item.correct-item { border-left:4px solid var(--emerald-500); }
        .review-item.incorrect-item { border-left:4px solid #ef4444; }
        .review-item .ri-decree {
            font-family: var(--font-heading);
            font-size:0.7rem; font-weight:600; text-transform:uppercase;
            letter-spacing:0.08em; color:var(--emerald-700); margin-bottom:0.4rem;
        }
        .review-item .ri-scenario { font-style:italic; color:var(--text-secondary); font-size:0.85rem; margin-bottom:0.5rem; font-family: var(--font-serif); }
        .review-item .ri-question { font-family:var(--font-serif); font-weight:700; color:var(--text); margin-bottom:0.75rem; }
        .review-item .ri-option {
            display:flex; align-items:center; gap:0.6rem; padding:0.4rem 0.6rem;
            border-radius:6px; margin-bottom:0.3rem; font-size:0.85rem;
            color: var(--text); font-family: var(--font-sans);
        }
        .ri-option.user-correct { background:var(--correct-bg); font-weight:600; }
        .ri-option.user-incorrect { background:var(--incorrect-bg); font-weight:600; }
        .ri-option.show-correct { background:var(--correct-bg); }
        .ri-option .ri-marker {
            width:18px; height:18px; border-radius:50%; display:flex;
            align-items:center; justify-content:center; font-size:0.6rem; flex-shrink:0;
            border:2px solid var(--border);
        }
        .ri-option.user-correct .ri-marker { border-color:var(--emerald-500); color:var(--emerald-500); }
        .ri-option.user-incorrect .ri-marker { border-color:#ef4444; color:#ef4444; }
        .ri-option.show-correct .ri-marker { border-color:var(--emerald-500); color:var(--emerald-500); }
        .review-item .ri-explanation {
            margin-top:0.6rem; font-size:0.8rem; color:var(--text-secondary);
            padding-top:0.6rem; border-top:1px solid var(--border); font-family: var(--font-sans);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 0;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
            background: var(--card-bg);
        }
        .footer-logo {
            max-width: 70px;
            height: auto;
            margin-bottom: 0.75rem;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .footer-logo:hover { opacity: 1; }
        .footer p {
            font-family: var(--font-serif);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }
        .footer .credit {
            font-family: var(--font-heading);
            font-weight: 600;
            color: var(--emerald-500);
            margin-top: 0.25rem;
            font-size: 0.85rem;
        }

        /* ========== VIDEO LOADING OVERLAY (light mode) ========== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f8fafc;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        .loading-overlay.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .video-container {
            position: relative;
            width: min(400px, 85vw);
            height: min(400px, 85vw);
            max-width: 400px;
            max-height: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
            background: #ffffff;
            border: 2px solid #e2e8f0;
        }
        #loading-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .loading-text {
            font-family: var(--font-heading);
            font-size: clamp(1rem, 3vw, 1.4rem);
            font-weight: 600;
            color: #059669;
            letter-spacing: 0.25em;
            text-align: center;
            animation: pulse-light 1.5s infinite;
        }
        @keyframes pulse-light {
            0%, 100% {
                opacity: 0.6;
                text-shadow: 0 0 8px rgba(5, 150, 105, 0.2);
            }
            50% {
                opacity: 1;
                text-shadow: 0 0 20px rgba(5, 150, 105, 0.5), 0 0 40px rgba(5, 150, 105, 0.2);
            }
        }

        @keyframes fadeInUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity:0; } }

        @media (max-width:600px) {
            .quiz-card, .start-screen, .result-screen, .review-screen { padding:1.5rem 1.2rem; }
            .quiz-question { font-size:1.1rem; }
            .next-btn { width:100%; justify-content:center; }
            .quiz-actions { flex-direction:column; align-items:stretch; }
            .result-actions { flex-direction:column; align-items:center; }
            .decree-breakdown { max-width:100%; }
            .video-container {
                width: min(280px, 75vw);
                height: min(280px, 75vw);
            }
        }
        @media (min-width:601px) and (max-width:1024px) {
            .video-container {
                width: min(350px, 60vw);
                height: min(350px, 60vw);
            }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration:0.01ms!important; transition-duration:0.01ms!important; }
        }
    </style>
</head>

    <script>
        (function() {
            const overlay = document.getElementById('loading-overlay');
            const video = document.getElementById('loading-video');
            const pageStart = performance.now();
            function hideOverlay() {
                overlay.classList.add('hide');
                setTimeout(() => {
                    overlay.style.display = 'none';
                    if (video) { video.pause(); video.removeAttribute('src'); video.load(); }
                }, 600);
            }
            const minDisplay = 3000;
            if (video) {
                video.addEventListener('loadeddata', () => {
                    const elapsed = performance.now() - pageStart;
                    const remaining = Math.max(0, minDisplay - elapsed);
                    setTimeout(hideOverlay, remaining);
                });
                setTimeout(() => {
                    const elapsed = performance.now() - pageStart;
                    if (elapsed < minDisplay + 2000) setTimeout(hideOverlay, Math.max(0, minDisplay - elapsed));
                }, 5000);
            } else setTimeout(hideOverlay, minDisplay);
            window.addEventListener('load', () => {
                const elapsed = performance.now() - pageStart;
                const remaining = Math.max(0, minDisplay - elapsed);
                setTimeout(() => { if (overlay.style.display !== 'none') hideOverlay(); }, remaining);
            });
        })();
    </script>

    <script>
        (function() {
            const FULL_QUESTION_BANK = [
                { id:"I-1", decree:"Decree I, Section 1", scenario:"You lose your temper in an argument and start shouting insults at someone.", question:"What should you do instead?", choices:["Demand an apology first","Stay calm and control yourself","Leave the argument at once","Report the other person to a Tormentor"], correctIndex:1, explanation:"You are expected to stay calm and behave with respect and self-control." },
                { id:"I-2", decree:"Decree I, Section 2", scenario:"Your ID badge is missing from your Facebook Featured Highlights. You already got a warning for this.", question:"What do you do now?", choices:["Use a friend's badge for the day","Upload the badge to Featured Highlights right away","Hope nobody checks","Explain the situation and ask for a replacement"], correctIndex:1, explanation:"Badges must appear in Featured Highlights at all times. A second offense leads to expulsion. Fix it immediately." },
                { id:"I-3", decree:"Decree I, Section 3", scenario:"You want to speak to your Tormentor, Ms. Reyes, in the group chat. You are unsure how to address her.", question:"How do you address her?", choices:["Say 'hey' and keep it casual","Use 'Ms. Reyes' or 'Ms. [First Name]'","Use her full name without a title","Wait for her to start the conversation"], correctIndex:1, explanation:"Tormentors are addressed as 'Ms.' or 'Mr.' followed by their surname or first name." },
                { id:"I-4", decree:"Decree I, Section 4", scenario:"You feel angry and want to vent in the group chat. It is a Tuesday.", question:"What is the safest way to vent without breaking the rule?", choices:["Use symbols to hide the swear word","Type the word and unsend it fast","Send it in a private message instead","Express yourself without profanity"], correctIndex:3, explanation:"Profanity is forbidden on weekdays. The safest path is to skip it completely." },
                { id:"I-5", decree:"Decree I, Section 5", scenario:"You have been flirting a lot and making romantic moves in the main group chat. Others are uncomfortable.", question:"What does the decree require of you?", choices:["Keep going, flirting is not mentioned","Take the conversation to private messages","Stop at once, this is a prohibited public display","Ask the group if they mind"], correctIndex:2, explanation:"Inappropriate behavior and public displays of affection are not allowed. You must stop." },
                { id:"II-1", decree:"Decree II, Section 1", scenario:"Your Sinnercell gave you a task, but you keep avoiding it.", question:"What is expected of you?", choices:["Do it when you feel like it","Get someone else to do it","Finish the task and take part actively","Write an excuse to the Sentinel"], correctIndex:2, explanation:"You are required to complete assigned tasks and participate in your role." },
                { id:"II-2", decree:"Decree II, Section 2", scenario:"You dislike the group chat theme and want to change it.", question:"What should you do?", choices:["Change it, it is only a theme","Ask a Berserker, Tormentor, or Mephistopheles to change it","Make a poll first","Change it for a while and see if anyone notices"], correctIndex:1, explanation:"Only Mephistopheles, Tormentors, and Berserkers may alter group settings." },
                { id:"II-3", decree:"Decree II, Section 3", scenario:"You will be away from internet for five days.", question:"What must you do before you leave?", choices:["Leave, five days is not long","Tell a Tormentor or Mephistopheles and give a valid reason","Ask a friend to pretend you are active","Set your nickname to 'Away'"], correctIndex:1, explanation:"Inactivity over two days without a valid reason gets you removed. Notify them in advance." },
                { id:"III-1", decree:"Decree III, Section 1", scenario:"You send a message with a typo and want to unsend it.", question:"When are you allowed to unsend a message?", choices:["Never","Only if the message has real-world info","Only within 30 seconds","Only if a Tormentor approves"], correctIndex:1, explanation:"Unsending is only permitted for messages containing real-world information." },
                { id:"III-2", decree:"Decree III, Section 2", scenario:"A Mephistopheles declared Chat Off. You need to ask something urgent.", question:"What must you do?", choices:["Send the question anyway","Wait until the Mephistopheles who silenced the chat allows you to speak","Message a Tormentor privately","Type 'PTC' to ask for chat permission"], correctIndex:1, explanation:"You stay silent until the person who started Chat Off gives you leave to speak. PTC is forbidden." },
                { id:"III-3", decree:"Decree III, Section 3", scenario:"You want to post 10 party emojis in a row to celebrate.", question:"After how many identical emojis does it become spam?", choices:["3","More than 4","5","No limit"], correctIndex:1, explanation:"Sending more than four likes, emojis, stickers, or repeated typos breaks the anti-spam rule." },
                { id:"IV-1", decree:"Decree IV, Section 1", scenario:"You have romantic feelings for a Tormentor.", question:"What must you do about those feelings?", choices:["Keep it secret and try a quiet relationship","Ask the Tormentor out privately","Do not act on them. The relationship is banned","Leave the University first"], correctIndex:2, explanation:"Romantic relationships between Tormentors or Mephistopheles and Demons are forbidden." },
                { id:"IV-2", decree:"Decree IV, Section 2", scenario:"A rival group invites you to their chat and asks you to share info about this University.", question:"What is the correct response?", choices:["Accept, it is only sharing","Join but give no sensitive details","Decline and report the approach if they push","Visit their chat on weekends only"], correctIndex:2, explanation:"You must stay loyal to this University. Any form of spying is prohibited." },
                { id:"IV-3", decree:"Decree IV, Section 3", scenario:"You feel out of place in your Sinnercell and want to transfer to a different one.", question:"What should you try first?", choices:["Transfer right away","Wait for the University to reopen transfers","Work to resolve the issue inside your current Sinnercell","Ask a Tormentor to move you quietly"], correctIndex:2, explanation:"Transfers are restricted. You must make a real effort to fix things where you are before asking for a move." },
                { id:"IV-4", decree:"Decree IV, Section 4", scenario:"You took a screenshot of an internal announcement and want to post it on your Facebook wall.", question:"What should you do?", choices:["Post it, it is public info","Post it but blur the names","Do not share it without permission","Ask in the group chat if it is okay"], correctIndex:2, explanation:"Only authorized information goes public. Posting without approval will bring a penalty." },
                { id:"V-1", decree:"Decree V, Section 1", scenario:"You see a Tormentor giving easier tasks to one Demon over and over.", question:"What is your duty?", choices:["Ignore it, not your problem","Confront the Tormentor directly","Report the unfairness to the Mephistopheles","Help the favored Demon with the easy tasks"], correctIndex:2, explanation:"You must report any favoritism or unfair treatment to the Mephistopheles." },
                { id:"V-2", decree:"Decree V, Section 2 and 3", scenario:"You find a violation sign (like ☒) attached to your nickname in the Sinnercell chat.", question:"What happens to you right away?", choices:["Nothing for 48 hours","You are removed from the main group chat","You must recruit 2 new members","You get a warning first"], correctIndex:1, explanation:"A mark removes you from the main group chat immediately. You stay out until the mark is officially lifted." },
                { id:"V-3", decree:"Decree V, Section 3", scenario:"Your violation mark got lifted after you finished all penalties, including recruiting new members.", question:"What do you expect next?", choices:["You stay only in the Sinnercell chat forever","You get back into the main group chat","You must apply for membership again","You are on permanent probation"], correctIndex:1, explanation:"Once the mark is gone and penalties are done, your main group chat access returns." }
            ];

            const app = document.getElementById('quiz-app');
            const STORAGE_KEY_PROGRESS = 'mcu_quiz_progress_v7';
            const FINISHED_KEY = 'mcu_quiz_finished';
            const RESULT_KEY = 'mcu_quiz_result';

            let currentQuestion = 0, score = 0, quizCompleted = false, feedbackActive = false;
            let selectedQuestions = [], userAnswers = [];
            let currentStreak = 0;
            let decreeStats = { I:{total:0,correct:0}, II:{total:0,correct:0}, III:{total:0,correct:0}, IV:{total:0,correct:0}, V:{total:0,correct:0} };

            function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
            function saveProgress(){
                const d={currentQuestion,score,quizCompleted,selectedIds:selectedQuestions.map(q=>q.id),userAnswers,currentStreak,timestamp:Date.now()};
                localStorage.setItem(STORAGE_KEY_PROGRESS,JSON.stringify(d));
            }
            function clearProgress(){ localStorage.removeItem(STORAGE_KEY_PROGRESS); }

            function saveFinalResult() {
                const resultData = {
                    score: score,
                    total: selectedQuestions.length,
                    decreeStats: decreeStats,
                    selectedQuestions: selectedQuestions,
                    userAnswers: userAnswers
                };
                localStorage.setItem(RESULT_KEY, JSON.stringify(resultData));
                localStorage.setItem(FINISHED_KEY, 'true');
            }

            function updateDecreeStats(q, isCorrect){
                const decreeNum = q.id.split('-')[0];
                if(!decreeStats[decreeNum]) decreeStats[decreeNum] = {total:0,correct:0};
                decreeStats[decreeNum].total++;
                if(isCorrect) decreeStats[decreeNum].correct++;
            }

            function createConfetti(){
                const colors = ['#10b981','#059669','#34d399','#6ee7b7'];
                for(let i=0;i<60;i++){
                    const conf = document.createElement('div');
                    conf.style.cssText = `position:fixed;top:-10px;left:${Math.random()*100}vw;width:${Math.random()*8+4}px;height:${Math.random()*8+4}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};animation:fall ${Math.random()*3+2}s linear forwards;z-index:1000;pointer-events:none;`;
                    document.body.appendChild(conf);
                    setTimeout(()=>conf.remove(),5000);
                }
            }

            function renderPermanentResult(data) {
                const {score, total, decreeStats, selectedQuestions, userAnswers} = data;
                const pct = Math.round((score/total)*100);
                const decreeOrder = ['I','II','III','IV','V'];
                const breakdownHTML = decreeOrder.map(d=>{
                    const s = decreeStats[d]||{total:0,correct:0};
                    const dpct = s.total>0?Math.round((s.correct/s.total)*100):0;
                    return `<div class="breakdown-row"><span class="breakdown-label">Decree ${d}</span><div class="breakdown-bar-track"><div class="breakdown-bar-fill ${dpct===0?'zero':''}" style="width:${dpct}%"></div></div><span class="breakdown-score">${s.correct}/${s.total}</span></div>`;
                }).join('');
                let msg = pct===100?'Perfect. You know the Legacy.':pct>=70?'Good effort. A few decrees need review.':pct>=50?'You passed, barely. Read the Codex again.':'The Council says study harder.';
                app.innerHTML = `<div class="quiz-container result-screen">
                    <div class="result-icon"><svg class="icon" style="font-size:3.5rem;"><use href="#icon-shield"/></svg></div>
                    <div class="result-title">Trial Completed</div>
                    <div class="result-subtitle">You have already taken this trial. Results are final.</div>
                    <div class="score-circle"><span class="score-value">${score}/${total}</span><span class="score-total">${pct}%</span></div>
                    <div class="decree-breakdown"><h4>Performance by Decree</h4>${breakdownHTML}</div>
                    <div class="result-message">${msg}</div>
                    <div class="result-actions">
                        <button class="btn" id="review-permanent-btn"><svg class="icon"><use href="#icon-eye"/></svg> Review Answers</button>
                        <button class="btn btn-outline" id="share-permanent-btn"><svg class="icon"><use href="#icon-book"/></svg> Share Results</button>
                        <a href="front.html" class="btn btn-outline"><svg class="icon"><use href="#icon-flame"/></svg> Belphegor</a>
                    </div>
                </div>`;
                document.getElementById('review-permanent-btn').addEventListener('click', ()=>{
                    renderReviewFromData(selectedQuestions, userAnswers, score);
                });
                document.getElementById('share-permanent-btn').addEventListener('click', ()=>{
                    const text = `I scored ${score}/${total} (${pct}%) on the Sinnercell Trial.`;
                    navigator.clipboard?.writeText(text).then(()=>{
                        const btn=document.getElementById('share-permanent-btn'); btn.innerHTML='Copied!'; setTimeout(()=>btn.innerHTML='<svg class="icon"><use href="#icon-book"/></svg> Share Results',2000);
                    });
                });
            }

            function renderReviewFromData(questions, answers, totalScore) {
                app.innerHTML = `<div class="quiz-container review-screen">
                    <div class="review-header"><h2>Trial Review</h2><span class="progress">${totalScore}/${questions.length} correct</span></div>
                    ${questions.map((q,i)=>{ const ua=answers[i]; const isCorrect=ua===q.correctIndex; return `<div class="review-item ${isCorrect?'correct-item':'incorrect-item'}"><div class="ri-decree">${q.decree}</div><div class="ri-scenario">"${q.scenario}"</div><div class="ri-question">${q.question}</div>${q.choices.map((c,j)=>{ let cls=''; if(j===ua&&isCorrect) cls='user-correct'; else if(j===ua&&!isCorrect) cls='user-incorrect'; else if(j===q.correctIndex&&!isCorrect) cls='show-correct'; return `<div class="ri-option ${cls}"><div class="ri-marker">${j===q.correctIndex?'✓':j===ua&&!isCorrect?'✗':''}</div><span>${c}</span></div>`; }).join('')}<div class="ri-explanation">${q.explanation}</div></div>`; }).join('')}
                    <div class="result-actions"><button class="btn" id="back-to-permanent-result">Back to Results</button></div>
                </div>`;
                document.getElementById('back-to-permanent-result').addEventListener('click', ()=>{
                    const saved = JSON.parse(localStorage.getItem(RESULT_KEY));
                    if (saved) renderPermanentResult(saved);
                });
            }

            function renderStartScreen(){
                // Check if already finished
                if (localStorage.getItem(FINISHED_KEY) === 'true') {
                    const savedResult = localStorage.getItem(RESULT_KEY);
                    if (savedResult) {
                        try {
                            const data = JSON.parse(savedResult);
                            renderPermanentResult(data);
                            return;
                        } catch(e) {}
                    }
                }

                // Check for in-progress quiz
                const savedProgress = localStorage.getItem(STORAGE_KEY_PROGRESS);
                if (savedProgress) {
                    try {
                        const prog = JSON.parse(savedProgress);
                        if (!prog.quizCompleted && prog.selectedIds && prog.selectedIds.length > 0) {
                            // Resume option
                            app.innerHTML = `<div class="quiz-container start-screen">
                                <div class="shield-icon"><svg class="icon" style="font-size:3.5rem;"><use href="#icon-shield"/></svg></div>
                                <h2>Sinnercell Trial</h2>
                                <p>You have an unfinished trial. Continue where you left off or start a new one.</p>
                                <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-top:1.5rem;">
                                    <button class="btn" id="resume-btn"><svg class="icon"><use href="#icon-play"/></svg> Resume Trial</button>
                                    <button class="btn btn-outline" id="new-btn">Start New Trial</button>
                                </div>
                            </div>`;
                            document.getElementById('resume-btn').addEventListener('click', ()=>{
                                loadProgress(prog);
                            });
                            document.getElementById('new-btn').addEventListener('click', ()=>{
                                clearProgress();
                                startNewQuiz();
                            });
                            return;
                        }
                    } catch(e) {}
                }
                // Default: new quiz
                startNewQuiz();
            }

            function startNewQuiz() {
                clearProgress();
                quizCompleted=false; currentQuestion=0; score=0; userAnswers=[]; currentStreak=0;
                decreeStats = { I:{total:0,correct:0}, II:{total:0,correct:0}, III:{total:0,correct:0}, IV:{total:0,correct:0}, V:{total:0,correct:0} };
                selectedQuestions = shuffle([...FULL_QUESTION_BANK]).slice(0,10);
                app.innerHTML = `<div class="quiz-container start-screen"><div class="shield-icon"><svg class="icon" style="font-size:3.5rem;"><use href="#icon-shield"/></svg></div><h2>Sinnercell Trial</h2><p>This test is for Demons, the student members.<br>10 situations. Pick the right action.</p><p style="font-size:0.8rem;color:var(--text-secondary)">No time limit. One attempt only — results are final.</p><button class="btn" id="start-btn"><svg class="icon"><use href="#icon-play"/></svg> Begin Trial</button></div>`;
                document.getElementById('start-btn').addEventListener('click', ()=>{ startQuiz(); });
            }

            function loadProgress(prog) {
                selectedQuestions = FULL_QUESTION_BANK.filter(q => prog.selectedIds.includes(q.id));
                currentQuestion = prog.currentQuestion;
                score = prog.score;
                userAnswers = prog.userAnswers;
                currentStreak = prog.currentStreak || 0;
                quizCompleted = false;
                // Reset decree stats based on answered questions
                decreeStats = { I:{total:0,correct:0}, II:{total:0,correct:0}, III:{total:0,correct:0}, IV:{total:0,correct:0}, V:{total:0,correct:0} };
                for (let i=0; i<currentQuestion; i++) {
                    const q = selectedQuestions[i];
                    const ua = userAnswers[i];
                    if (q && ua !== undefined) {
                        const isCorrect = ua === q.correctIndex;
                        const decreeNum = q.id.split('-')[0];
                        if(!decreeStats[decreeNum]) decreeStats[decreeNum] = {total:0,correct:0};
                        decreeStats[decreeNum].total++;
                        if(isCorrect) decreeStats[decreeNum].correct++;
                    }
                }
                renderQuestion();
            }

            function startQuiz(){ currentQuestion=0; score=0; quizCompleted=false; userAnswers=[]; currentStreak=0; decreeStats = { I:{total:0,correct:0}, II:{total:0,correct:0}, III:{total:0,correct:0}, IV:{total:0,correct:0}, V:{total:0,correct:0} }; saveProgress(); renderQuestion(); }

            function renderQuestion(){
                if(currentQuestion>=selectedQuestions.length){ completeQuiz(); return; }
                feedbackActive=false;
                const q=selectedQuestions[currentQuestion];
                const streakClass = currentStreak === 0 ? 'zero' : '';
                app.innerHTML = `<div class="quiz-container quiz-card" role="main"><div class="quiz-header"><span class="decree-badge">${q.decree}</span><div class="quiz-meta"><div class="streak-display ${streakClass}" id="streak-display"><svg class="icon"><use href="#icon-fire"/></svg> <span>${currentStreak}</span></div><span class="progress">Question <span>${currentQuestion+1}</span> / ${selectedQuestions.length}</span></div></div><div class="quiz-scenario">"${q.scenario}"</div><div class="quiz-question">${q.question}</div><div class="options-group" role="radiogroup">${q.choices.map((c,i)=>`<button class="quiz-option" role="radio" aria-checked="false" data-index="${i}" tabindex="${i===0?0:-1}"><div class="option-circle">${i+1}</div><span>${c}</span></button>`).join('')}</div><div class="quiz-actions"><div class="feedback-message" id="feedback-msg" aria-live="polite"></div><button class="next-btn" id="next-btn" disabled>${currentQuestion<selectedQuestions.length-1?'Next Scenario':'Submit Trial'} <svg class="icon"><use href="#icon-arrow-right"/></svg></button></div></div>`;
                const opts=document.querySelectorAll('.quiz-option'), nb=document.getElementById('next-btn'), fb=document.getElementById('feedback-msg');
                if(opts.length) opts[0].focus();
                opts.forEach(o=>o.addEventListener('click',()=>{ if(feedbackActive)return; opts.forEach(x=>x.setAttribute('aria-checked','false')); o.setAttribute('aria-checked','true'); nb.disabled=false; fb.textContent=''; fb.classList.remove('error'); }));
                nb.addEventListener('click',()=>{ if(feedbackActive)return; const sel=document.querySelector('.quiz-option[aria-checked="true"]'); if(!sel){ fb.textContent='Pick an answer first.'; fb.classList.add('error'); return; } const idx=Number.parseInt(sel.dataset.index,10); userAnswers[currentQuestion]=idx; const correct=q.correctIndex, isCorrect=(idx===correct); opts.forEach((o,i)=>{ o.setAttribute('aria-disabled','true'); if(i===correct) o.classList.add('correct-feedback'); if(i===idx&&!isCorrect) o.classList.add('incorrect-feedback'); }); fb.textContent=isCorrect?`Correct. ${q.explanation}`:`Not right. ${q.explanation}`; fb.classList.toggle('error',!isCorrect); if(isCorrect){ score++; currentStreak++; } else { currentStreak=0; } updateDecreeStats(q,isCorrect); feedbackActive=true; nb.disabled=true; setTimeout(()=>{ currentQuestion++; saveProgress(); feedbackActive=false; renderQuestion(); }, 2000); });
                document.querySelector('.options-group').addEventListener('keydown',e=>{ const cur=document.activeElement; if(!cur.classList.contains('quiz-option'))return; const o=Array.from(document.querySelectorAll('.quiz-option')), i=o.indexOf(cur); if(e.key==='ArrowDown'||e.key==='ArrowRight'){ e.preventDefault(); o[(i+1)%o.length].focus(); } else if(e.key==='ArrowUp'||e.key==='ArrowLeft'){ e.preventDefault(); o[(i-1+o.length)%o.length].focus(); } else if(e.key===' '||e.key==='Enter'){ e.preventDefault(); cur.click(); } });
                document.addEventListener('keydown', function numberSelect(e){ if(feedbackActive||quizCompleted)return; const opts2=document.querySelectorAll('.quiz-option'); if(['1','2','3','4'].includes(e.key)){ const idx=Number.parseInt(e.key,10)-1; if(opts2[idx]){ opts2.forEach(o=>o.setAttribute('aria-checked','false')); opts2[idx].setAttribute('aria-checked','true'); nb.disabled=false; fb.textContent=''; fb.classList.remove('error'); } } if(e.key==='Enter'&&document.querySelector('.quiz-option[aria-checked="true"]')&&!nb.disabled){ nb.click(); } });
                saveProgress();
            }

            function completeQuiz(){
                quizCompleted=true; clearProgress();
                saveFinalResult(); // save for one-take lock
                const total=selectedQuestions.length, pct=Math.round((score/total)*100);
                if(pct===100) setTimeout(createConfetti,300);
                const decreeOrder = ['I','II','III','IV','V'];
                const breakdownHTML = decreeOrder.map(d=>{
                    const s = decreeStats[d]||{total:0,correct:0};
                    const dpct = s.total>0?Math.round((s.correct/s.total)*100):0;
                    return `<div class="breakdown-row"><span class="breakdown-label">Decree ${d}</span><div class="breakdown-bar-track"><div class="breakdown-bar-fill ${dpct===0?'zero':''}" style="width:${dpct}%"></div></div><span class="breakdown-score">${s.correct}/${s.total}</span></div>`;
                }).join('');
                let msg=pct===100?'Perfect. You know the Legacy.':pct>=70?'Good effort. A few decrees need review.':pct>=50?'You passed, barely. Read the Codex again.':'The Council says study harder.';
                app.innerHTML = `<div class="quiz-container result-screen"><div class="result-icon"><svg class="icon" style="font-size:3.5rem;"><use href="#icon-shield"/></svg></div><div class="result-title">Trial Done</div><div class="result-subtitle">Your results are final. This trial cannot be retaken.</div><div class="score-circle"><span class="score-value">${score}/${total}</span><span class="score-total">${pct}%</span></div><div class="decree-breakdown"><h4>Performance by Decree</h4>${breakdownHTML}</div><div class="result-message">${msg}</div><div class="result-actions"><button class="btn" id="review-btn"><svg class="icon"><use href="#icon-eye"/></svg> Review Answers</button><button class="btn btn-outline" id="share-btn"><svg class="icon"><use href="#icon-book"/></svg> Share Results</button><a href="front.html" class="btn btn-outline"><svg class="icon"><use href="#icon-flame"/></svg> Belphegor</a><a href="students.html" class="btn btn-outline"><svg class="icon"><use href="#icon-users"/></svg> Legion</a></div></div>`;
                document.getElementById('review-btn').addEventListener('click', renderReview);
                document.getElementById('share-btn').addEventListener('click',()=>{
                    const text = `I scored ${score}/${total} (${pct}%) on the Sinnercell Trial.`;
                    navigator.clipboard?.writeText(text).then(()=>{
                        const btn=document.getElementById('share-btn'); btn.innerHTML='Copied!'; setTimeout(()=>btn.innerHTML='<svg class="icon"><use href="#icon-book"/></svg> Share Results',2000);
                    });
                });
            }

            function renderReview(){
                const total=selectedQuestions.length;
                app.innerHTML = `<div class="quiz-container review-screen"><div class="review-header"><h2>Trial Review</h2><span class="progress">${score}/${total} correct</span></div>${selectedQuestions.map((q,i)=>{ const ua=userAnswers[i]; const isCorrect=ua===q.correctIndex; return `<div class="review-item ${isCorrect?'correct-item':'incorrect-item'}"><div class="ri-decree">${q.decree}</div><div class="ri-scenario">"${q.scenario}"</div><div class="ri-question">${q.question}</div>${q.choices.map((c,j)=>{ let cls=''; if(j===ua&&isCorrect) cls='user-correct'; else if(j===ua&&!isCorrect) cls='user-incorrect'; else if(j===q.correctIndex&&!isCorrect) cls='show-correct'; return `<div class="ri-option ${cls}"><div class="ri-marker">${j===q.correctIndex?'✓':j===ua&&!isCorrect?'✗':''}</div><span>${c}</span></div>`; }).join('')}<div class="ri-explanation">${q.explanation}</div></div>`; }).join('')}<div class="result-actions"><button class="btn" id="back-to-results-btn">Back to Results</button></div></div>`;
                document.getElementById('back-to-results-btn').addEventListener('click', ()=>{ completeQuiz(); });
            }

            // Dark mode
            const darkToggle = document.getElementById('dark-toggle');
            const darkIcon = darkToggle.querySelector('use');
            function updateDarkIcon() {
                darkIcon.setAttribute('href', document.body.classList.contains('dark') ? '#icon-sun' : '#icon-moon');
            }
            if (localStorage.getItem('mcu_dark_mode') === 'true') document.body.classList.add('dark');
            updateDarkIcon();
            darkToggle.addEventListener('click', () => {
                const isDark = document.body.classList.toggle('dark');
                localStorage.setItem('mcu_dark_mode', isDark);
                updateDarkIcon();
            });
//a
            // Hamburger menu
            const hamburger = document.getElementById('hamburger');
            const mobileMenu = document.getElementById('mobile-menu');
            const menuOverlay = document.getElementById('menu-overlay');
            function closeMenu() { mobileMenu.classList.remove('open'); menuOverlay.classList.remove('active'); }
            function openMenu() { mobileMenu.classList.add('open'); menuOverlay.classList.add('active'); }
            hamburger.addEventListener('click', (e) => { e.stopPropagation(); mobileMenu.classList.contains('open') ? closeMenu() : openMenu(); });
            menuOverlay.addEventListener('click', closeMenu);
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && mobileMenu.classList.contains('open')) closeMenu(); });

            // Boot
            renderStartScreen();
        })();
    </script>
</body>
</html>
